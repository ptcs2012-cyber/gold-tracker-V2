<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Gold Price Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h1 {
            color: #ffd700;
            margin-bottom: 5px;
        }
        .status {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 20px;
        }
        .price-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background-color: #2a2a2a;
            border-radius: 8px;
        }
        .price-box h2 {
            margin: 0;
            font-size: 1.2em;
            color: #aaa;
        }
        .price-box p {
            margin: 10px 0 0 0;
            font-size: 2.5em;
            font-weight: bold;
            color: #4caf50;
        }
        canvas {
            background-color: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ffd700;
            color: #121212;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ffc107;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>XAU Live Tracker</h1>
        <div class="status" id="last-updated">Last Updated: Fetching...</div>

        <div class="price-container">
            <div class="price-box">
                <h2>USD / oz</h2>
                <p id="price-usd">--</p>
            </div>
            <div class="price-box">
                <h2>MYR / oz</h2>
                <p id="price-myr">--</p>
            </div>
        </div>

        <canvas id="goldChart" width="400" height="200"></canvas>
        <button onclick="fetchGoldPrice()">Refresh Price</button>
    </div>

    <script>
        // Note: To make this app production-ready, replace the API URL below 
        // with your own endpoint from a service like GoldAPI.io or Metals-API.com
        // Paste your GoldAPI key inside the quotes below
        const apiKey = 'goldapi-41dc67b10b2e6bb45c46eaa336d135e2-io'; 
        
        // Setting up the Chart.js instance
        const ctx = document.getElementById('goldChart').getContext('2d');
        const goldChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Time labels
                datasets: [{
                    label: 'Gold Price (USD)',
                    data: [],
                    borderColor: '#ffd700',
                    backgroundColor: 'rgba(255, 215, 0, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { ticks: { color: '#aaa' } },
                    y: { ticks: { color: '#aaa' } }
                },
                plugins: {
                    legend: { labels: { color: '#fff' } }
                }
            }
        });

        async function fetchGoldPrice() {
            try {
                document.getElementById('last-updated').innerText = 'Fetching live data...';

                // 1. Fetch Live USD Price from GoldAPI
                const responseUSD = await fetch('https://www.goldapi.io/api/XAU/USD', {
                    method: 'GET',
                    headers: {
                        'x-access-token': apiKey,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!responseUSD.ok) throw new Error("API Limit Reached or Invalid Key");
                const dataUSD = await responseUSD.json();
                const liveUSD = dataUSD.price;

                // 2. Fetch Live MYR Price from GoldAPI
                const responseMYR = await fetch('https://www.goldapi.io/api/XAU/MYR', {
                    method: 'GET',
                    headers: {
                        'x-access-token': apiKey,
                        'Content-Type': 'application/json'
                    }
                });
                const dataMYR = await responseMYR.json();
                const liveMYR = dataMYR.price;

                const now = new Date();
                const timeString = now.toLocaleTimeString();

                // 3. Update UI Text
                document.getElementById('price-usd').innerText = `$${liveUSD.toFixed(2)}`;
                document.getElementById('price-myr').innerText = `RM ${liveMYR.toFixed(2)}`;
                document.getElementById('last-updated').innerText = `Last Updated: ${now.toLocaleString()}`;

                // 4. Update Chart
                if (goldChart.data.labels.length > 10) {
                    goldChart.data.labels.shift();
                    goldChart.data.datasets[0].data.shift();
                }
                goldChart.data.labels.push(timeString);
                goldChart.data.datasets[0].data.push(liveUSD);
                goldChart.update();

            } catch (error) {
                console.error('Error fetching gold price:', error);
                document.getElementById('last-updated').innerText = 'Error: Check console or API limit.';
            }
        }

        // Fetch price immediately on load
        fetchGoldPrice();
        
        // Refresh every 30 minutes (1,800,000 milliseconds) to stay under the 100 requests/day limit.
        // 2 calls (USD & MYR) per 30 mins = 96 calls a day. 
        setInterval(fetchGoldPrice, 1800000);
